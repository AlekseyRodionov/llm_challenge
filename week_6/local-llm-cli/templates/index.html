<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Local LLM Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .response {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .error {
            background: #ffe0e0;
            color: #c00;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Local LLM Chat</h1>
    
    <form method="post" action="/ask">
        <input type="text" name="prompt" placeholder="Введите вопрос..." required>
        <button type="submit">Отправить</button>
    </form>
    
    {% if response %}
        <div class="response">
            <h3>Ответ:</h3>
            <p>{{ response }}</p>
        </div>
    {% endif %}
    
    {% if error %}
        <div class="error">
            <h3>Ошибка:</h3>
            <p>{{ error }}</p>
        </div>
    {% endif %}
</body>
</html>
